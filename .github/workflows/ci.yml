name: Rockgotá CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install pandas requests beautifulsoup4 pymysql sqlalchemy

      - name: Verificar importaciones
        run: |
          python -c "import pandas, requests, bs4, sqlalchemy; print('✅ Dependencias OK')"

      - name: Verificar estructura del proyecto
        run: |
          test -f scrapper.py && echo "✅ scrapper.py existe"
          test -f rockgota_productos_enriquecidos.csv && echo "✅ CSV existe"
